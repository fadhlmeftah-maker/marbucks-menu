<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marbucks | القائمة العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #d4af37;
            --brand-dark: #0a0f0d;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--brand-dark);
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gold-text { color: var(--brand-gold); }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-tab { transition: all 0.3s; opacity: 0.5; white-space: nowrap; font-weight: 700; border-bottom: 2px solid transparent; padding-bottom: 8px;}
        .cat-tab.active { opacity: 1; color: var(--brand-gold); border-bottom-color: var(--brand-gold); font-weight: 900; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeUp { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="antialiased">

    <div id="welcome-screen" class="fixed inset-0 z-[2000] bg-[url('https://images.unsplash.com/photo-1497935586351-b67a49e012bf?q=80&w=1000')] bg-cover bg-center flex flex-col justify-between text-center">
        <div class="absolute inset-0 bg-gradient-to-b from-[#0a0f0d]/90 via-[#0a0f0d]/80 to-[#0a0f0d] backdrop-blur-sm"></div>
        <div class="relative z-10 flex flex-col items-center justify-center pt-20">
            <img src="https://i.ibb.co/m5v8G8p6/marbucks-logo.png" class="w-36 h-36 rounded-full border-2 border-[#d4af37] shadow-[0_0_60px_rgba(212,175,55,0.4)] mb-8 animate-pulse">
            <h1 class="text-5xl font-black uppercase tracking-widest italic gold-text">Marbucks</h1>
            <p class="mt-4 text-sm tracking-[0.4em] uppercase opacity-70">Experience True Luxury</p>
        </div>
        <div class="relative z-10 p-8 w-full max-w-md mx-auto mb-10 space-y-4">
            <button onclick="startApp('برج الروهجان (المركز الرئيسي)')" class="w-full glass-panel p-5 rounded-3xl font-bold text-lg text-right flex justify-between items-center">
                <span>🏛️ برج الروهجان (المركز الرئيسي)</span>
                <span class="gold-text">←</span>
            </button>
            <button onclick="startApp('شارع الجامعة')" class="w-full glass-panel p-5 rounded-3xl font-bold text-lg text-right flex justify-between items-center">
                <span>🎓 فرع شارع الجامعة</span>
                <span class="gold-text">←</span>
            </button>
            <button onclick="startApp('صالة الروهجان أكشن')" class="w-full glass-panel p-5 rounded-3xl font-bold text-lg text-right flex justify-between items-center">
                <span>⚡ صالة الروهجان أكشن</span>
                <span class="gold-text">←</span>
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex flex-col">
        <header class="sticky top-0 z-[100] bg-[#0a0f0d]/90 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center text-center">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co/m5v8G8p6/marbucks-logo.png" class="w-12 h-12 rounded-full border border-[#d4af37]/40">
                <div class="leading-none text-right">
                    <h2 class="text-xl font-black uppercase italic tracking-tighter">Marbucks</h2>
                    <p id="branch-display" class="text-[9px] gold-text font-bold mt-1 uppercase"></p>
                </div>
            </div>
            <div onclick="toggleCart()" class="relative bg-[#d4af37] p-3 rounded-2xl shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#0a0f0d]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[11px] w-5 h-5 rounded-full flex items-center justify-center font-black hidden">0</span>
            </div>
        </header>

        <nav class="sticky top-[81px] z-[90] bg-[#0a0f0d] border-b border-white/5 py-4 px-6 overflow-x-auto cat-scroll flex gap-8 items-center">
            <button onclick="filterMenu('legends')" class="cat-tab active" id="tab-legends">أساطير سبأ</button>
            <button onclick="filterMenu('mojito')" class="cat-tab" id="tab-mojito">مهيتو</button>
            <button onclick="filterMenu('cold')" class="cat-tab" id="tab-cold">بارد</button>
            <button onclick="filterMenu('hot')" class="cat-tab" id="tab-hot">ساخن</button>
        </nav>

        <main class="flex-grow p-6 py-10">
            <div id="products-grid" class="grid grid-cols-2 gap-6">
                </div>
        </main>
    </div>

    <script>
        let productsDatabase = [
            { id: 1, cat: 'legends', name: 'ماربكس سجنتشر', price: 4500, img: 'https://images.unsplash.com/photo-1544145945-f904253d0c71?w=500' },
            { id: 2, cat: 'legends', name: 'إكسير سبأ', price: 4000, img: 'https://images.unsplash.com/photo-1497534446932-c946e7316ba1?w=500' }
        ];
        let userCart = [];
        let activeBranch = "";

        function startApp(branchName) {
            activeBranch = branchName;
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('branch-display').innerText = branchName;
            filterMenu('legends');
        }

        function filterMenu(category) {
            document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + category).classList.add('active');
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            productsDatabase.filter(p => p.cat === category).forEach(item => {
                grid.innerHTML += `
                    <div class="glass-panel rounded-3xl p-4 flex flex-col items-center text-center animate-fadeUp">
                        <img src="${item.img}" class="w-full h-32 object-cover rounded-2xl mb-4">
                        <h3 class="font-bold text-xs mb-2">${item.name}</h3>
                        <p class="gold-text font-black mb-4">${item.price} ر.ي</p>
                        <button onclick="addToCart(${item.id})" class="w-full py-2 bg-[#d4af37] text-black rounded-xl font-bold text-xs">إضافة</button>
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = productsDatabase.find(i => i.id === id);
            userCart.push(p);
            document.getElementById('cart-badge').innerText = userCart.length;
            document.getElementById('cart-badge').classList.remove('hidden');
        }
    </script>
</body>
</html>
